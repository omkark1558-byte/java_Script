<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cokkies</title>
</head>

<body>


    <h1>Cookies The Example THEME 📍</h1>

    <button onclick="setCookies('dark')">Dark Theme</button>
    <button onclick="setCookies('light')">Light Theme</button>
    <button onclick="display()">Display</button>
    <button onclick="CookiesExpiry()">SET EXPIRE</button>


    <script>

        function CookiesExpiry() {
            const date = new Date();
            date.setDate(date.getDate()+1);
            document.cookie=`name=AZINK;expire=${date.toUTCString()}`
        }
        function display() {
            console.log(document.cookie);

        }
        function setCookies(theme) {
            document.cookie = "theme=" + theme + "; path=/";
            handleTheme();
        }
        function handleTheme() {
            console.log(document.cookie);

            if (document.cookie.includes("theme=dark")) {
                document.body.style.backgroundColor = "black"
                document.body.style.color = "white"
            }
            else {
                document.body.style.backgroundColor = "white"
                document.body.style.color = "black"
            }
        }
        // setCookies();
        handleTheme();

    </script>
</body>

</html>
